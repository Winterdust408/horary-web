<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/horary-web/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="In-browser horary astrology chart calculator" />
    <link rel="manifest" href="/horary-web/manifest.json" />
    <title>Horary Calculator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        if (location.hostname === 'localhost') {
          navigator.serviceWorker.getRegistrations().then(regs => {
            if (regs.length > 0) { regs.forEach(r => r.unregister()); window.location.reload() }
          })
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/horary-web/sw.js')
            let refreshing = false
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (!refreshing) { refreshing = true; window.location.reload() }
            })
          })
        }
      }
    </script>
  </body>
</html>
